# Log options
logs:

  # Enabling the logs, useful for debugging, can lead to information leaks if you're not careful.
  enabled: true

  # Whether to show current time before the log text.
  show_time: false

  # Time format if you enabled 'show_time'.
  time_format: "Y-m-d H:i:s"

  # Whether to print ANSI colors or not.
  # Disable this option in production, since you don't need to see any logs, or you want to keep them in a text file.
  use_colors: true

  # Whether to keep every new CLI connection information in logs
  # Only enable this option if you're only using Netcat or CLI tools, but if you are using other client tools such as
  # PHP client or Browser client keep it disabled since the log file can easily grow up!
  save_cli_connections: true

  # Whether to keep authorization attempts to CLI
  # Only enable this option if you're only using Netcat or CLI tools, but if you are using other client tools such as
  # PHP client or Browser client keep it disabled since the log file can easily grow up!
  save_cli_logins: true

  # Display the execution time of operations in logs
  benchmark: true

  # Whether to show backup logs (when taking backup in AOL files)
  # Note: warnings and high priority messages will be shown despite what this option is set to
  # Also remember that file logs will always get printed, this option only affects terminal and console logs
  backup_logs: true

  # Whether to show snapshot logs
  # Note: warnings and high priority messages will be shown despite what this option is set to
  # Also remember that file logs will always get printed, this option only affects terminal and console logs
  snapshot_logs: true

  # Whether to show database logs (validation, loading messages, file creations, etc.)
  # Note: warnings and high priority messages will be shown despite what this option is set to
  # Also remember that file logs will always get printed, this option only affects terminal and console logs
  database_logs: true

  # Whether to show server logs (HTTP/TCP/Socket connections and status messages)
  # Note: warnings and high priority messages will be shown despite what this option is set to
  # Also remember that file logs will always get printed, this option only affects terminal and console logs
  server_logs: true

  # Whether to show system logs (security logs, lockdown, configuration messages, etc.)
  # Note: warnings and high priority messages will be shown despite what this option is set to
  # Also remember that file logs will always get printed, this option only affects terminal and console logs
  system_logs: true

  # Whether to show shell logs (shell authorization, etc.)
  # Note: warnings and high priority messages will be shown despite what this option is set to
  # Also remember that file logs will always get printed, this option only affects terminal and console logs
  shell_logs: true

  # Whether to show CLI logs (CLI connections, server status, CLI authorization messages, etc.)
  # Note: warnings and high priority messages will be shown despite what this option is set to
  # Also remember that file logs will always get printed, this option only affects terminal and console logs
  cli_logs: true

  # Whether to show cypher logs (messages related to encryption core, e.g: key generation, algorithm selection)
  # Note: warnings and high priority messages will be shown despite what this option is set to
  # Also remember that file logs will always get printed, this option only affects terminal and console logs
  cypher_logs: true

# Server configuration
server:

  # Server port, this port will be used for both websocket and HTTP web server.
  port: 6401

  # TCP port for CLI
  # Set it to 0 to disable CLI server
  cli_port: 6402

  # Maximum login attempts for CLI.
  # Set it to 0 to disable brute-force protection for CLI and websocket authentication
  max_cli_login_attempt: 5

  # Lockdown type for CLI and websocket authentication.
  # After exceeding the max login attempts, the CLI will be locked down.
  # Set it to "ip" to block that IP for a certain amount of time.
  # Set it to "token" to block that token for a certain amount of time. This can be helpful against brute-force attacks
  # as the attacker can change their IP.
  # Note: Lockdown doesn't affect existing sessions, but as soon as they leave the room, they can't log in again
  # until the cool-down period completes (if they use a locked-down token).
  cli_lockdown: "ip"

  # Cooldown period (in seconds)
  # After a few unsuccessful login attempts, the lockdown starts and after a certain amount of time it'll be lifted out.
  # Also, you can disable it manually by removing the '.lockdown' file in the program root directory.
  # When lockdown starts the locked-down IPs or tokens will be disabled and no one can authenticate with those IPs or
  # tokens until the period is passed.
  # Minimum value: 5
  # Note: this option will be used for websocket authentication too, however in websocket, login attempts are stored
  # inside memory and in case of crash or exiting the process, the attempts list will be cleared.
  cli_cooldown: 60

  # Set how long (in milliseconds) a client can stay connected to CLI without authentication.
  # Minimum value: 1000
  cli_authentication_timeout: 5000

  # The maximum size allowed for CLI input.
  # You can limit the input size of CLI for safety reasons and more reliability.
  # Remember that if you limit the input size, you may not be able to add large data in memory.
  # For example, by sending the command "set key1 value1", the input size will be 15 characters
  # or 15 bytes in UTF-8.
  # The correct format is "XY" where X is the expected size without a fraction (e.g: 12, 10) and Y is the
  # size unit (e.g: "MB", "B", "KB", "MiB") which is case-insensitive.
  # For no limit, set it to 0
  cli_input_size: 1MB

  # Whether to handle HTTP request or leave them as they are
  # If you disable this option, internal GUI tools won't work
  http_server: true

  # Enabling the home page for GUI.
  # If you enable this, you can access the home page and API endpoints (might not be implemented in the current version)
  # Requires your access token to access API endpoints.
  home_page: true

  # Set the host for GUI control panel
  # If you are using it in production, set it to your host domain, e.g: "example.com"
  # If you are using it on localhost, set it to "localhost"
  # Otherwise set it to "auto" to match the current URL, it'll get the host from `window.location.hostname` in browser.
  gui_host: "auto"

  # Whether to enable SSL in websocket for GUI
  # If using localhost, set it to false, otherwise set it based on your preferences
  secure_gui: false

  # Filter allowed origins, by using the default value ".*" you will accept any origins from any website.
  # Remember this origin is only for management applications like the web interface, not the TCP-CLI.
  # To filter the origin, use a regex for allowed origins, here are a few examples:
  # 1) "https?:\/\/example\.com" - accepts 'example.com' origin with both 'http' and 'https' protocols.
  # 2) "https:\/\/example\.com" - only accepts 'example.com' origin with only https' protocol.
  # 3) "https?:\/\/(example|domain)\.com" - only accepts 'example.com' and 'domain.com' domains.
  # 4) "\.com$" - only accepts domains that ends with '.com' (useless, but you get the idea).
  # 5) ".*" - accepts every domain.
  allowed_origins: ".*"

# Directories and paths
dir:

  # Database directory path, it can be either a relative path to the current directory or an absolute path to anywhere.
  # If you want to locate the database files into another path, you can change it to the full target path.
  database: "db"

  # Log files directory path, it can be either a relative path to the current directory or an absolute path to anywhere.
  # If you want to locate the log files into another path, you can change it to another path.
  logs: "logs"

# Configuration for persistence options.
# Instead of continuously writing data to database files, changes are initially recorded in some backup files.
# During initialization, all backup files are parsed to update the database files.
# Backup operations run in the background, ensuring they do not impact application performance.
persistent:

  # If you don't need your data to be permanent, you can disable this option.
  # Disabling this option will store data in memory only,
  # which means all data will be lost once the application is terminated.
  # Change this for temporary data storage needs, where data permanence is not required (like caching systems).
  enabled: true

  # Define the maximum size for each backup file.
  # When a backup file reaches this size limit, a new backup file will be created,
  # and new data will be written to the new file.
  # Set the limit to 0 to allow backup files with unlimited size, though this is not recommended.
  # Unlimited file sizes may lead to performance issues if the application runs for long periods.
  # NOTE: it's not recommended to use a number less than a megabyte since it'll drop the entry if it's larger than this
  # limit. Even for development and testing, do not set it to any number less than 20 bytes (the smallest entry possible).
  backup_size_limit: 5MB

  # Define the interval taking backups (in milliseconds)
  # To disable backup, set it to 0
  # It's not recommended to use any number smaller than 5000, smaller number means more CPU load and increasing
  # the risk of backup miss and data loss.
  backup_interval: 30000

  # Define a limit for backup files before automatic snapshot gets triggered
  # Set it to 0 to disable automatic snapshot
  # For example if you set it to 5MB, when your backup (AOL) files reach to 5MB a new snapshot will be taken and
  # all the backup files will be stored in the database and deleted after.
  snapshot_size_trigger: 10MB

  # Define the interval of taking snapshot (in milliseconds)
  # To disable automatic snapshots, set it to 0
  # When taking a snapshot, backup (AOL) files will be parsed and their data will be written on the database
  # IMPORTANT NOTE: snapshots can be heavy depending on the database count and pending data size, to prevent heavy load
  # on your system, on larger databases you might need to set a larger number.
  # When a snapshot process overlaps another (one is not finished yet and another is about to start), the new
  # process will be ignored (you can request one snapshot at a time).
  # You can also disable is (by setting to 0) and then set a limit for backup files to get automatic snapshot after a
  # certain amount of data has been written (see persistent.snapshot_size_trigger).
  snapshot_interval: 0

# MEID (Mapped Excluded Independent Database)
meids:

  # Whether to encrypt database files.
  # If you enable encryption, you need to set a 32-byte string in `snowflake.sfx` file or let it generate a random key.
  # This '.sfx' file is the cypher key of your encryption, you can change this key file path.
  # The encryption key is a 32-byte string that will be used for encryption and decryption of your database.
  # If the encryption key is bigger than 32 bytes, it'll trim the rest of it, and if it's less than 32 bytes it'll throw
  # an error.
  # If you remove the file it'll generate a random key for you. Feel free to take a backup from your encryption key.
  encrypt: false

  # The path of Snowflake cypher key file
  # This file contains the binary of your encryption cypher, or you can place a 32 characters length string,
  # then the program will generate the binary from that string automatically.
  # If the provided key is invalid it'll throw an error.
  # Changing the file name and format is not recommended but safe.
  # Note: keep this file somewhere safe as it can be used to decrypt your database (if encrypted).
  encryption_cypher: "./db/snowflake.sfx"

  # Whether to recover the database on startup
  # If you have your database files (some or all of them) encrypted, enable this and 'encrypt' option together, then
  # restart your app and all the encrypted files will be decrypted, you can disable encryption after that.
  recover: false

  # Database files (keys, meids and backup files) permission.
  # Use any Unix permission (chmod) as string, e.g: "644", "777".
  # Set it to null to leave the permission as default.
  permission: "777"

  # Whether to verify the file signatures against the app signature.
  # If enabled, the database files must match the current app signature (which can be modified in the app.json file);
  # otherwise, the program won't start.
  # This is a simple validation step to prevent accidentally accessing a different database directory or file.
  check_signature: false

  # Your database splits data into multiple files (called MEIDs) to reduce the risk of data corruption and avoid large
  # file sizes.
  # These files are completely independent, deleting or corrupting one will only affect the data stored in that file.
  # More MEIDs mean more databases to manage, so if you only need a small database, a single MEID is enough.
  # Set this value to 0 to use all MEIDs available in the database directory;
  # For example, if you have 3 database files ("meid-0.sfd", "meid-1.sfd", and "meid-2.sfd"), all of them will be used.
  count: 1

  # Maximum number of allowed database files.
  # Once all MEID files are filled, the database will stop working until some space is freed.
  # When persisting data, this limit can also help prevent infinite or excessive long loops.
  # 32 is a reasonable value, allowing you to store up to 128GB of data in total (in the default configuration).
  # Note: if you set 'meids.count' option to any number other than 0, this option will be useless. It means you can only
  # use this option if you have indeterminate database.
  max_count: 32

  # The allowed size for each database file (MEID).
  # By limiting the allowed size, you limit the maximum size of each file.
  # If the limit exceeds, it won't add that any other entry to the database unless there is more space in other MEID
  # files.
  # The correct format is "XY" where X is the expected size (e.g: 12, 10.5) and Y is the
  # size unit (e.g: "MB", "B", "KB") which is case-insensitive.
  # Set it to 0 for no limit.
  # Supported SI units: B, KB, MB, GB, TB
  # Supported IEC units: KiB, MiB, GiB, TiB
  # 1GB = 1,000,000,000 Bytes
  # 1GiB = 1,073,741,824 Bytes
  # Maximum value is 4GB or 3.72529GiB
  size: 4GB

# Memory management configuration
memory:

  # Whether to monitor memory usage or not, you can manage memory by enabling it.
  # If you disable it (by setting it to false or no), options specified with [MONITOR] keyword will be ignored.
  monitor: true

  # [MONITOR]
  # Maximum allowed size memory can reach, if the limit exceeds, it won't add any entry to the memory.
  # The correct format is "XY" where X is the expected size (e.g: 12, 10.5) and Y is the size
  # unit (e.g: "MB", "B", "KB") which is case-insensitive.
  # If you add no unit, it would be considered as B (bytes).
  # Set it to 0 for no limit.
  # Note: this is the size of your database values only, not the actual size of your database in RAM;
  # For example a database with 10,000 entries contained 458KB of data but took 54MB of RAM due to encryption (if enabled)
  # and V8 object allocation.
  max_size: 1GB

  # Whether to use mega-binary mode or not (mostly used in displaying data size).
  # In Mega-binary mode, 1KB equals to 1024 bytes, but in standard mode it equals to 1000 bytes.
  # Note that this might not be used in some cases. For example, when setting the MEID size, you define a fixed format
  # for the file size, such as 4GB or 3.72GiB, which are effectively the same, it mostly is used for displaying sizes.
  mb_mode: false

# Filesystem configuration
filesystem:

  # The filesystem you are using on the partition database directory is located
  # Note that this doesn't affect read and write, it's just for clarification for database file format and size limit.
  # When you are using "FAT32" the maximum allowed size is 4GiB per file, meaning that your database files cannot exceed
  # this limit. However, in filesystems such as "EXT4" you are allowed to store up to 16TiB in each file!
  # Allowed filesystems are (case-insensitive): "FAT32", "EXT4", "NTFS".
  # If you are unsure about it, or you're not using any of these filesystems leave it set to "FAT32".
  # If you are using EXT4 partition on your system, it's safe to use FAT32, since EXT4 supports more capacity than FAT32
  name: "FAT32"

  # The maximum allowed size that a file can be (or you want to be)
  # It's better to match it near as your filesystem limit, for example for FAT32 4GiB (or even 4GB) is a good limit,
  # however it's not recommended to go beyond 4GiB in any filesystem as it takes the possibility to move to another one.
  # Also note that you can and should limit database and backup files size in their own configuration, this option can
  # be considered a failsafe for other files.
  max_size: 4GiB
